<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>パトロール管理</title>
</head>
<body>

  <h1>パトロール管理</h1>

  <h2>記録登録</h2>
  <form method="POST" action="/add">

    <div>
      <label>日付：</label>
      <input type="date" name="date">
    </div>

    <div>
      <label>記入者：</label>
      <input name="person">
    </div>

    <div>
      <label>場所：</label>
      <input name="place">
    </div>

    <div>
      <label>状態：</label>
      <select name="status">
        <option value="○">○</option>
        <option value="△">△</option>
        <option value="×">×</option>
      </select>
    </div>

    <div>
      <label>コメント：</label>
      <input name="comment">
    </div>

    <button>登録</button>
  </form>

</body>
</html>
